[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  AWS_LAMBDA_JS_RUNTIME = "nodejs20.x"
  SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
  AWS_LAMBDA_FUNCTION_TIMEOUT = "30"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

[build]
  command = "fc-list && npm install"
