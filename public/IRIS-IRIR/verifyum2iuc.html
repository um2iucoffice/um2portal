<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Student Verification — UM2IUC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f4f6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 36px 32px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    text-align: center;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .logo-text { font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .logo-sub  { font-size: 12px; color: #888; }

  /* Loading state */
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #eee;
    border-top-color: #8b1a1a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Valid state */
  .badge-valid {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e6f9ee;
    color: #1a7a3c;
    font-weight: 600;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 20px;
  }

  /* Invalid state */
  .badge-invalid {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fdecea;
    color: #b71c1c;
    font-weight: 600;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 20px;
  }

  .student-name {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
  }

  .student-id {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
    font-family: monospace;
    letter-spacing: 1px;
  }

  .fields {
    background: #f8f8fa;
    border-radius: 10px;
    padding: 16px;
    text-align: left;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 13px;
  }
  .field:last-child { border-bottom: none; }
  .field .lbl { color: #888; }
  .field .val { font-weight: 600; color: #1a1a2e; }

  .verified-by {
    font-size: 11px;
    color: #aaa;
    margin-top: 16px;
  }

  .error-msg {
    font-size: 15px;
    color: #b71c1c;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .error-sub {
    font-size: 13px;
    color: #888;
  }
</style>
</head>
<body>
<div class="card" id="card">

  <div class="logo">
    <div>
      <div class="logo-text">UM2IUC</div>
      <div class="logo-sub">University of Medicine (2) · IUC</div>
    </div>
  </div>

  <!-- Loading -->
  <div id="stateLoading">
    <div class="spinner"></div>
    <p style="color:#888;font-size:14px">Verifying student record…</p>
  </div>

  <!-- Valid -->
  <div id="stateValid" style="display:none">
    <div class="badge-valid">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Verified Student
    </div>
    <div class="student-name" id="vName">—</div>
    <div class="student-id" id="vId">—</div>
    <div class="fields">
      <div class="field">
        <span class="lbl">Program</span>
        <span class="val" id="vProgram">—</span>
      </div>
      <div class="field">
        <span class="lbl">Valid Through</span>
        <span class="val" id="vValid">—</span>
      </div>
      <div class="field">
        <span class="lbl">Card Type</span>
        <span class="val" id="vType">—</span>
      </div>
    </div>
    <div class="verified-by">Verified by UM2IUC IRIS System · <span id="vTime">—</span></div>
  </div>

  <!-- Invalid -->
  <div id="stateInvalid" style="display:none">
    <div class="badge-invalid">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Verification Failed
    </div>
    <div class="error-msg" id="vError">This QR code is invalid or has expired.</div>
    <div class="error-sub">If you believe this is a mistake, please contact the Registrar's Office.</div>
  </div>

</div>

<script>
  // Get token from URL
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('t');

  if (!token) {
    showInvalid('No verification token found in this URL.');
  } else {
    // Call the verify function
    fetch(`/.netlify/functions/verify-qr?t=${encodeURIComponent(token)}`)
      .then(r => r.json())
      .then(data => {
        if (data.valid) {
          showValid(data);
        } else {
          showInvalid(data.error || 'Invalid or expired QR code.');
        }
      })
      .catch(() => {
        showInvalid('Could not connect to verification server. Please try again.');
      });
  }

  function showValid(data) {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateValid').style.display   = '';
    document.getElementById('vName').textContent    = data.name      || '—';
    document.getElementById('vId').textContent      = 'ID: ' + (data.studentId  || '—');
    document.getElementById('vProgram').textContent = data.program   || '—';
    document.getElementById('vValid').textContent   = data.validThrough || '—';
    document.getElementById('vType').textContent    = data.type === 'idcard' ? 'Student ID Card' : 'Document';
    document.getElementById('vTime').textContent    = new Date().toLocaleString();
  }

  function showInvalid(msg) {
    document.getElementById('stateLoading').style.display  = 'none';
    document.getElementById('stateInvalid').style.display  = '';
    document.getElementById('vError').textContent = msg;
  }
</script>
</body>
</html>
